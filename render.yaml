services:
  - type: web
    name: comparative-legal-engine-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Comparative Legal Engine
      - key: ENVIRONMENT
        value: production
      - key: GEMINI_FILE_SEARCH_STORE
        value: Islamic-Law-Sources
      - key: GEMINI_FILE_SEARCH_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: GEMINI_FILE_SEARCH_FALLBACK_MODELS
        value: ""
      - key: GEMINI_SYNTHESIS_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: GEMINI_SYNTHESIS_FALLBACK_MODELS
        value: ""
      - key: GEMINI_CALLS_PER_MINUTE
        value: "12"
      - key: GEMINI_MIN_SECONDS_BETWEEN_CALLS
        value: "4.2"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
